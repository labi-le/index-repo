name: update flake

on:
  workflow_run:
    workflows: [ "release" ]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: update flake.nix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # get latest release version
          release=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name')
          version=${release#v}
          echo "VERSION=$version" >> $GITHUB_ENV

          # get checksums
          curl -sL "https://github.com/${{ github.repository }}/releases/download/$release/checksums.txt" -o checksums.txt

          # get hash for x86_64-linux binary and convert to SRI
          amd64_hash=$(grep "index-repo_linux_amd64$" checksums.txt | cut -d ' ' -f1)
          amd64_sri=$(nix hash convert --to sri "sha256:$amd64_hash")

          echo "AMD64_SRI=$amd64_sri" >> $GITHUB_ENV

          # update version in flake.nix
          sed -i "s/version = \"[^\"]*\";/version = \"$version\";/" flake.nix
          # update x86_64-linux hash
          sed -i "s|hash = \"sha256-[^\"]*\"; # x86_64-linux|hash = \"$amd64_sri\"; # x86_64-linux|" flake.nix

          # cleanup
          rm checksums.txt

      - name: create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          commit-message: "chore: update flake.nix to v${{ env.VERSION }}"
          title: "chore: update flake.nix to v${{ env.VERSION }}"
          body: |
            automated update for release v${{ env.VERSION }}.

            **changes:**
            - version: `${{ env.VERSION }}`
            - x86_64-linux hash: `${{ env.AMD64_SRI }}`
          branch: update-flake
          delete-branch: true

      - name: merge pull request
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge
